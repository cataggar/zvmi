name: Rebuild Azure Linux 4 release image

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: azurelinux4-release-image
  cancel-in-progress: false

env:
  RELEASE_TAG: AzureLinux4.0-20260714
  RELEASE_TITLE: Azure Linux 4.0 - 20260714
  ASSET_NAME: AzureLinux-4.0-x86_64.qcow2
  WORK_DIR: .scratch/generalized-azurelinux4

jobs:
  rebuild:
    name: rebuild and replace release asset
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Install image build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dnf file jq openssh-client ovmf qemu-system-x86 qemu-utils xorriso
          # Ubuntu defaults to ~/.rpmdb; use the database shipped in the Azure Linux rootfs.
          echo '%_dbpath /usr/lib/sysimage/rpm' | sudo tee /root/.rpmmacros
          test "$(sudo rpm --eval '%{_dbpath}')" = /usr/lib/sysimage/rpm

      - name: Verify target release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Resolve ISO cache key
        id: iso
        run: |
          checksum=$(curl -fsSL https://aka.ms/azurelinux-4.0-x86_64-iso-checksum | awk '{print $1}')
          if [[ ! "$checksum" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Unexpected Azure Linux ISO checksum: $checksum"
            exit 1
          fi
          echo "sha256=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Azure Linux ISO
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK_DIR }}/AzureLinux-4.0-x86_64.iso
          key: azurelinux-4.0-x86_64-iso-${{ steps.iso.outputs.sha256 }}

      - name: Build maximum-zstd QCOW2
        run: |
          mkdir -p dist
          set -o pipefail
          zig build generalized-azurelinux4 -- \
            --work-dir "$GITHUB_WORKSPACE/$WORK_DIR" \
            --size 1184M \
            --output "$GITHUB_WORKSPACE/dist/$ASSET_NAME" 2>&1 | tee "$RUNNER_TEMP/azurelinux4-build.log"

      - name: Validate release image
        run: |
          qemu-img check "dist/$ASSET_NAME"
          test "$(qemu-img info --output=json "dist/$ASSET_NAME" | jq -r '.format')" = qcow2
          test "$(qemu-img info --output=json "dist/$ASSET_NAME" | jq -r '."virtual-size"')" = 1241513984
          sha256sum "dist/$ASSET_NAME"

      - name: Boot finalized UKI QCOW2
        timeout-minutes: 8
        env:
          IMAGE: ${{ github.workspace }}/dist/${{ env.ASSET_NAME }}
          OVMF_CODE: /usr/share/OVMF/OVMF_CODE_4M.fd
          OVMF_TEMPLATE: /usr/share/OVMF/OVMF_VARS_4M.fd
          OVMF_VARS: ${{ runner.temp }}/azurelinux4-OVMF_VARS.fd
          OVF_DIR: ${{ runner.temp }}/zvmi-local-ovf
          OVF_ISO: ${{ runner.temp }}/zvmi-local-ovf.iso
          SSH_KEY: ${{ runner.temp }}/zvmi-test-ed25519
          SERIAL_LOG: ${{ runner.temp }}/zvmi-serial.log
          SSH_PORT: "2222"
        run: |
          set -euo pipefail
          test -x /usr/bin/qemu-system-x86_64
          test -r "$OVMF_CODE"
          test -r "$OVMF_TEMPLATE"
          test -r "$IMAGE"

          source_sha256=$(sha256sum "$IMAGE" | awk '{print $1}')
          cp "$OVMF_TEMPLATE" "$OVMF_VARS"
          mkdir -p "$OVF_DIR"
          ssh-keygen -q -t ed25519 -N '' -C zvmi-ci -f "$SSH_KEY"
          public_key=$(cat "$SSH_KEY.pub")
          cat > "$OVF_DIR/ovf-env.xml" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <Environment xmlns="http://schemas.dmtf.org/ovf/environment/1" xmlns:wa="http://schemas.microsoft.com/windowsazure">
            <wa:ProvisioningSection>
              <LinuxProvisioningConfigurationSet xmlns="http://schemas.microsoft.com/windowsazure">
                <HostName>zvmi-ci</HostName>
                <UserName>zvmitest</UserName>
                <DisableSshPasswordAuthentication>true</DisableSshPasswordAuthentication>
                <SSH><PublicKeys><PublicKey>
                  <Path>/home/zvmitest/.ssh/authorized_keys</Path>
                  <Value>$public_key</Value>
                </PublicKey></PublicKeys></SSH>
              </LinuxProvisioningConfigurationSet>
            </wa:ProvisioningSection>
          </Environment>
          EOF
          : > "$OVF_DIR/zvmi-local-provisioning"
          xorriso -as mkisofs -quiet -iso-level 3 -R -J \
            -V OVFENV -o "$OVF_ISO" "$OVF_DIR"
          chmod 0444 "$OVF_ISO"

          qemu_pid=
          cleanup() {
            status=$?
            set +e
            if [[ -n "$qemu_pid" ]] && kill -0 "$qemu_pid" 2>/dev/null; then
              kill -TERM "$qemu_pid"
              sleep 2
              if kill -0 "$qemu_pid" 2>/dev/null; then
                kill -KILL "$qemu_pid"
              fi
              wait "$qemu_pid"
            fi
            if [[ $status -ne 0 && -r "$SERIAL_LOG" ]]; then
              cat "$SERIAL_LOG"
            fi
            rm -rf "$OVF_DIR"
            rm -f "$OVF_ISO" "$OVMF_VARS" "$SSH_KEY" "$SSH_KEY.pub" "$SERIAL_LOG"
            exit "$status"
          }
          trap cleanup EXIT

          qemu-system-x86_64 \
            -machine q35,accel=tcg,smm=off \
            -m 2048 \
            -display none -monitor none \
            -serial "file:$SERIAL_LOG" -no-reboot -snapshot \
            -drive "if=pflash,unit=0,format=raw,readonly=on,file=$OVMF_CODE" \
            -drive "if=pflash,unit=1,format=raw,file=$OVMF_VARS" \
            -drive "file=$IMAGE,format=qcow2,if=virtio" \
            -drive "if=none,id=ovf,format=raw,media=cdrom,readonly=on,file=$OVF_ISO" \
            -device ide-cd,drive=ovf,bus=ide.1 \
            -nic "user,model=virtio-net-pci,hostfwd=tcp:127.0.0.1:$SSH_PORT-:22" &
          qemu_pid=$!

          ssh_options=(
            -i "$SSH_KEY"
            -p "$SSH_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=3
            -o IdentitiesOnly=yes
            -o KbdInteractiveAuthentication=no
            -o PasswordAuthentication=no
            -o PreferredAuthentications=publickey
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
          )
          ssh_ready=false
          for _ in $(seq 1 120); do
            if ssh "${ssh_options[@]}" zvmitest@127.0.0.1 true >/dev/null 2>&1; then
              ssh_ready=true
              break
            fi
            kill -0 "$qemu_pid"
            sleep 2
          done
          test "$ssh_ready" = true
          grep -Fq '[zvminit] ZVMINIT_PID1_READY supervisor loop active' "$SERIAL_LOG"
          grep -Fq '[zvminit] azagent completed successfully' "$SERIAL_LOG"

          inspect_guest=$(cat <<'GUEST'
          set -eu
          test "$(readlink -f /proc/1/exe)" = /sbin/zvminit
          test -b /dev/sr0
          test -f /var/lib/azagent/provisioned
          find_sshd_master() {
            for proc in /proc/[0-9]*; do
              test -r "$proc/status" || continue
              name=
              ppid=
              while read -r key value _; do
                case "$key" in
                  Name:) name=$value ;;
                  PPid:) ppid=$value ;;
                esac
              done < "$proc/status"
              test "$name" = sshd && test "$ppid" = 1 || continue
              cmdline=$(tr '\0' ' ' < "$proc/cmdline")
              case "$cmdline" in
                *"/usr/sbin/sshd -D -e"*) printf '%s\n' "${proc##*/}"; return 0 ;;
              esac
            done
            return 1
          }
          find_sshd_master
          GUEST
          )

          initial_master=$(ssh "${ssh_options[@]}" zvmitest@127.0.0.1 "$inspect_guest")
          [[ "$initial_master" =~ ^[0-9]+$ ]]
          ssh "${ssh_options[@]}" zvmitest@127.0.0.1 \
            "sudo /usr/bin/bash -c 'kill -KILL $initial_master'" >/dev/null 2>&1 || true

          restarted_master=
          for _ in $(seq 1 60); do
            candidate=$(ssh "${ssh_options[@]}" zvmitest@127.0.0.1 "$inspect_guest" 2>/dev/null || true)
            if [[ "$candidate" =~ ^[0-9]+$ && "$candidate" != "$initial_master" ]]; then
              restarted_master=$candidate
              break
            fi
            kill -0 "$qemu_pid"
            sleep 2
          done
          test -n "$restarted_master"

          ssh "${ssh_options[@]}" zvmitest@127.0.0.1 \
            'sudo /sbin/poweroff' >/dev/null 2>&1 || true
          qemu_exited=false
          for _ in $(seq 1 60); do
            if ! kill -0 "$qemu_pid" 2>/dev/null; then
              qemu_exited=true
              break
            fi
            sleep 1
          done
          test "$qemu_exited" = true
          set +e
          wait "$qemu_pid"
          qemu_status=$?
          set -e
          qemu_pid=
          test "$qemu_status" -eq 0
          test "$(sha256sum "$IMAGE" | awk '{print $1}')" = "$source_sha256"

      - name: Replace release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset_sha256=$(sha256sum "dist/$ASSET_NAME" | awk '{print $1}')
          asset_bytes=$(stat --format='%s' "dist/$ASSET_NAME")
          iso_sha256=$(sha256sum "$WORK_DIR/AzureLinux-4.0-x86_64.iso" | awk '{print $1}')
          base_digest=$(sed -n 's/^Resolved to \(sha256:[0-9a-f]\{64\}\)$/\1/p' "$RUNNER_TEMP/azurelinux4-build.log" | tail -n 1)
          source_commit=$(git rev-parse HEAD)

          if [[ ! "$base_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Could not recover the base OCI manifest digest from the build log"
            exit 1
          fi

          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          Generalized x86_64 Azure Linux 4.0 Gen2 image built with zvmi from current \`main\`. The QCOW2 uses maximum-level zstd cluster compression and boots directly from a Unified Kernel Image (UKI) under UEFI.

          - Asset: \`$ASSET_NAME\`
          - Boot path: \`UEFI -> EFI/BOOT/BOOTX64.EFI (UKI) -> kernel/initramfs -> zvminit\`
          - Secure Boot: disabled; UKI signing and trust are tracked in issue #168
          - Virtual disk size: 1184 MiB
          - EFI System Partition: 512 MiB
          - Root partition: 670 MiB
          - File size: $asset_bytes bytes
          - SHA-256: \`$asset_sha256\`
          - Source commit: \`$source_commit\`
          - Azure deployment username convention: \`g\`

          Provenance:

          - Source ISO: \`AzureLinux-4.0-x86_64.iso\`
          - ISO SHA-256: \`$iso_sha256\`
          - Base OCI manifest: \`$base_digest\`
          - UKI stub package: \`systemd-boot-unsigned-258.4-4.azl4.x86_64.rpm\`
          - UKI stub package SHA-256: \`85dd3ac0c532bceb09fc0a85c6568c51fc4ee84e0c478d1302b7a2d84e1bea5c\`

          The builder validates the finalized QCOW2's GPT, ESP, UKI sections, and embedded command line. The release workflow then boots that exact compressed artifact with QEMU/OVMF and ephemeral marked OVF media, proves key-only SSH, verifies \`zvminit\` is PID 1 and directly owns foreground sshd, kills sshd and reconnects after supervisor restart, powers off through PID 1, and re-hashes the unchanged source QCOW2. The base image identifies itself as Azure Linux 4.0 Container Image Beta with \`RELEASE_TYPE=development\`.
          EOF

          gh release upload "$RELEASE_TAG" "dist/$ASSET_NAME" --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_TITLE" \
            --notes-file "$RUNNER_TEMP/release-notes.md"

          {
            echo "### Release asset replaced"
            echo
            echo "- Release: https://github.com/$GITHUB_REPOSITORY/releases/tag/$RELEASE_TAG"
            echo "- Asset: https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/$ASSET_NAME"
            echo "- SHA-256: \`$asset_sha256\`"
          } >> "$GITHUB_STEP_SUMMARY"
