name: Build, validate, and publish Azure Linux 4 images

on:
  workflow_dispatch:
    inputs:
      candidate_run_id:
        description: Completed release run whose successful candidates should be reused
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: azurelinux4-release-20260722
  cancel-in-progress: false

env:
  RELEASE_TAG: AzureLinux-4.0-20260722
  RELEASE_TITLE: Azure Linux 4.0 - 20260722

jobs:
  prepare:
    name: resolve immutable main source
    if: github.repository == 'cataggar/zvmi' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      source_commit: ${{ steps.source.outputs.commit }}
      candidate_run_id: ${{ steps.source.outputs.candidate_run_id }}
      candidate_run_attempt: ${{ steps.source.outputs.candidate_run_attempt }}
      reuse_candidates: ${{ steps.source.outputs.reuse_candidates }}
    steps:
      - name: Check out merged main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Bind release to source commit
        id: source
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -z "$CANDIDATE_RUN_ID" ]]; then
            commit=$(git rev-parse HEAD)
            [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
            test "$(git rev-parse origin/main)" = "$commit"
            candidate_run_id=$GITHUB_RUN_ID
            candidate_run_attempt=$GITHUB_RUN_ATTEMPT
            reuse_candidates=false
          else
            [[ "$CANDIDATE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
            test "$CANDIDATE_RUN_ID" != "$GITHUB_RUN_ID"

            run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CANDIDATE_RUN_ID")
            test "$(jq -r .repository.full_name <<<"$run")" = "$GITHUB_REPOSITORY"
            test "$(jq -r .path <<<"$run")" = ".github/workflows/azurelinux4-release.yml"
            test "$(jq -r .event <<<"$run")" = workflow_dispatch
            test "$(jq -r .head_branch <<<"$run")" = main
            test "$(jq -r .status <<<"$run")" = completed
            commit=$(jq -r .head_sha <<<"$run")
            candidate_run_attempt=$(jq -r .run_attempt <<<"$run")
            [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
            [[ "$candidate_run_attempt" =~ ^[1-9][0-9]*$ ]]

            jobs=$(
              gh api --paginate \
                "repos/$GITHUB_REPOSITORY/actions/runs/$CANDIDATE_RUN_ID/jobs?per_page=100" |
                jq -s '[.[].jobs[]]'
            )
            artifacts=$(
              gh api --paginate \
                "repos/$GITHUB_REPOSITORY/actions/runs/$CANDIDATE_RUN_ID/artifacts?per_page=100" |
                jq -s '[.[].artifacts[]]'
            )
            for key in x86_64-full aarch64-full x86_64-core aarch64-core; do
              test "$(
                jq --arg name "build/hosted $key" \
                  '[.[] | select(.name == $name and .conclusion == "success")] | length' \
                  <<<"$jobs"
              )" = 1
              artifact="azurelinux4-candidate-$key-$commit-$candidate_run_attempt"
              test "$(
                jq --arg name "$artifact" \
                  '[.[] | select(.name == $name and .expired == false)] | length' \
                  <<<"$artifacts"
              )" = 1
            done

            candidate_run_id=$CANDIDATE_RUN_ID
            reuse_candidates=true
          fi

          test "$(git ls-remote origin "refs/tags/$RELEASE_TAG" | awk '{print $1}')" = "$commit"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "candidate_run_id=$candidate_run_id" >> "$GITHUB_OUTPUT"
          echo "candidate_run_attempt=$candidate_run_attempt" >> "$GITHUB_OUTPUT"
          echo "reuse_candidates=$reuse_candidates" >> "$GITHUB_OUTPUT"
          echo "Accepted source commit: \`$commit\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Candidate run: \`$candidate_run_id\` attempt \`$candidate_run_attempt\`" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build/hosted ${{ matrix.key }}
    needs: prepare
    if: needs.prepare.outputs.reuse_candidates != 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    environment: azurelinux4-signing
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - key: x86_64-full
            architecture: x86_64
            flavor: full
            runner: ubuntu-24.04
            asset_name: AzureLinux-4.0-x86_64.qcow2
            virtual_size: 5368709120
            iso_name: AzureLinux-4.0-x86_64.iso
            iso_sha256: d98f7d1ffaa916de7c9f66ffdadb150c174da691509e760835709ffa7829ca48
          - key: aarch64-full
            architecture: aarch64
            flavor: full
            runner: ubuntu-24.04-arm
            asset_name: AzureLinux-4.0-aarch64.qcow2
            virtual_size: 5368709120
            iso_name: AzureLinux-4.0-aarch64.iso
            iso_sha256: 762039fde64a59806750ee86ca98132fad4f9df02e7684490017cdfda0c55157
          - key: x86_64-core
            architecture: x86_64
            flavor: core
            runner: ubuntu-24.04
            asset_name: AzureLinux-4.0-x86_64.core.qcow2
            virtual_size: 1241513984
            iso_name: AzureLinux-4.0-x86_64.iso
            iso_sha256: d98f7d1ffaa916de7c9f66ffdadb150c174da691509e760835709ffa7829ca48
          - key: aarch64-core
            architecture: aarch64
            flavor: core
            runner: ubuntu-24.04-arm
            asset_name: AzureLinux-4.0-aarch64.core.qcow2
            virtual_size: 1241513984
            iso_name: AzureLinux-4.0-aarch64.iso
            iso_sha256: 762039fde64a59806750ee86ca98132fad4f9df02e7684490017cdfda0c55157
    env:
      CANDIDATE_KEY: ${{ matrix.key }}
      ARCHITECTURE: ${{ matrix.architecture }}
      FLAVOR: ${{ matrix.flavor }}
      ASSET_NAME: ${{ matrix.asset_name }}
      VIRTUAL_SIZE: ${{ matrix.virtual_size }}
      ISO_NAME: ${{ matrix.iso_name }}
      ISO_SHA256: ${{ matrix.iso_sha256 }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      WORK_DIR: .scratch/azurelinux4-release-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.key }}
      BUNDLE_DIR: artifact-staging/candidates/${{ matrix.key }}
      SIGNING_PROBE_DIR: ${{ github.workspace }}/signing-probe-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.key }}
      UKI_SIGN_COMMAND: ${{ github.workspace }}/zig-out/bin/zvmi
      ZVMI_AZURE_TENANT_ID: ${{ vars.ZVMI_AZURE_TENANT_ID }}
      ZVMI_AZURE_CLIENT_ID: ${{ vars.ZVMI_AZURE_CLIENT_ID }}
      ZVMI_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.ZVMI_ARTIFACT_SIGNING_ENDPOINT }}
      ZVMI_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.ZVMI_ARTIFACT_SIGNING_ACCOUNT }}
      ZVMI_ARTIFACT_SIGNING_PROFILE: ${{ vars.ZVMI_ARTIFACT_SIGNING_PROFILE }}
    steps:
      - name: Check out accepted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_commit }}
          persist-credentials: false

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@7d8c3ef0886dd428a97727fce3b74909d6eace78 # v0.6.6
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          ghr-version: 0.6.6
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Install image build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          packages=(
            curl dnf file jq openssh-client openssl python3-virt-firmware qemu-utils rpm sbsigntool tar xorriso
          )
          sudo apt-get install -y --no-install-recommends "${packages[@]}"
          echo '%_dbpath /usr/lib/sysimage/rpm' | sudo tee /root/.rpmmacros >/dev/null
          test "$(sudo rpm --eval '%{_dbpath}')" = /usr/lib/sysimage/rpm

      - name: Build built-in signer
        run: |
          set -euo pipefail
          unset ZIG_LOCAL_CACHE_DIR
          export ZIG_GLOBAL_CACHE_DIR=$PWD/.zig-global-cache
          zig build install-zvmi
          test -x "$UKI_SIGN_COMMAND"

      - name: Resolve protected signing certificate
        run: |
          set -euo pipefail
          uuid='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          [[ "$ZVMI_AZURE_TENANT_ID" =~ $uuid ]]
          [[ "$ZVMI_AZURE_CLIENT_ID" =~ $uuid ]]
          [[ "$ZVMI_ARTIFACT_SIGNING_ENDPOINT" =~ ^https://[a-z0-9.-]+\.codesigning\.azure\.net/?$ ]]
          [[ "$ZVMI_ARTIFACT_SIGNING_ACCOUNT" =~ ^[A-Za-z0-9._-]+$ ]]
          [[ "$ZVMI_ARTIFACT_SIGNING_PROFILE" =~ ^[A-Za-z0-9._-]+$ ]]
          certificate="$RUNNER_TEMP/zvmi-uki-signing-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${CANDIDATE_KEY}.pem"
          umask 077
          "$UKI_SIGN_COMMAND" sign certificate "$certificate"
          openssl x509 -in "$certificate" -noout
          actual=$(openssl x509 -in "$certificate" -outform DER | sha256sum | awk '{print $1}')
          echo "UKI_SIGNING_CERTIFICATE=$certificate" >> "$GITHUB_ENV"
          echo "UKI_SIGNING_CERTIFICATE_SHA256=$actual" >> "$GITHUB_ENV"

      - name: Prove protected signing end to end
        run: |
          set -euo pipefail
          unset ZIG_LOCAL_CACHE_DIR
          export ZIG_GLOBAL_CACHE_DIR=$PWD/.zig-global-cache
          case "$ARCHITECTURE" in
            x86_64) target=x86_64-uefi ;;
            aarch64) target=aarch64-uefi ;;
            *) exit 1 ;;
          esac
          scratch="$SIGNING_PROBE_DIR"
          mkdir -m 0700 "$scratch"
          unsigned="$scratch/unsigned.efi"
          signed="$scratch/signed.efi"
          metadata="$scratch/metadata.json"
          cp "$UKI_SIGNING_CERTIFICATE" "$scratch/certificate.pem"
          zig build-exe -target "$target" tests/efi_signing_probe.zig -femit-bin="$unsigned"
          export ZVMI_UKI_UNSIGNED="$unsigned"
          export ZVMI_UKI_SIGNED="$signed"
          export ZVMI_UKI_CERTIFICATE="$UKI_SIGNING_CERTIFICATE"
          export ZVMI_UKI_ARCHITECTURE="$ARCHITECTURE"
          export ZVMI_UKI_FLAVOR="$FLAVOR"
          export ZVMI_UKI_SIGNING_METADATA="$metadata"
          ZVMI_UKI_UNSIGNED_SHA256=$(sha256sum "$unsigned" | awk '{print $1}')
          export ZVMI_UKI_UNSIGNED_SHA256
          export ZVMI_UKI_CERTIFICATE_SHA256="$UKI_SIGNING_CERTIFICATE_SHA256"
          "$UKI_SIGN_COMMAND" sign
          test -s "$signed"
          test -s "$metadata"
          sbverify --verbose --cert "$UKI_SIGNING_CERTIFICATE" "$signed"
          rm -rf -- "$scratch"

      - name: Upload failed signing probe
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: azurelinux4-signing-probe-${{ matrix.key }}-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: ${{ env.SIGNING_PROBE_DIR }}/
          if-no-files-found: error
          retention-days: 1

      - name: Cache pinned Azure Linux ISO
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.WORK_DIR }}/${{ env.ISO_NAME }}
          key: azurelinux4-${{ matrix.architecture }}-iso-${{ matrix.iso_sha256 }}

      - name: Build exact finalized QCOW2
        run: |
          set -euo pipefail
          unset ZIG_LOCAL_CACHE_DIR
          export ZIG_GLOBAL_CACHE_DIR=$PWD/.zig-global-cache
          rm -rf -- "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/internal-provenance"
          set -o pipefail
          zig build \
            -Dazurelinux-arch="$ARCHITECTURE" \
            -Dazurelinux-flavor="$FLAVOR" \
            generalized-azurelinux4 -- \
            --work-dir "$GITHUB_WORKSPACE/$WORK_DIR" \
            --output "$GITHUB_WORKSPACE/$BUNDLE_DIR/$ASSET_NAME" \
            --uki-signing-certificate "$UKI_SIGNING_CERTIFICATE" \
            --uki-signing-certificate-sha256 "$UKI_SIGNING_CERTIFICATE_SHA256" \
            --uki-sign-command "$UKI_SIGN_COMMAND" \
            --uki-sign-command-arg sign \
            2>&1 | tee "$BUNDLE_DIR/internal-provenance/build.log"

      - name: Validate exact finalized QCOW2
        run: |
          set -euo pipefail
          asset="$BUNDLE_DIR/$ASSET_NAME"
          test -f "$asset"
          qemu-img check "$asset"
          qemu-img info --output=json "$asset" > "$BUNDLE_DIR/internal-provenance/qemu-img-info.json"
          python3 - "$BUNDLE_DIR/internal-provenance/qemu-img-info.json" "$VIRTUAL_SIZE" <<'PY'
          import json
          import sys
          info = json.load(open(sys.argv[1], encoding="utf-8"))
          if info.get("format") != "qcow2":
              raise SystemExit("candidate is not QCOW2")
          if info.get("virtual-size") != int(sys.argv[2]):
              raise SystemExit("candidate virtual size mismatch")
          if info.get("backing-filename") or info.get("full-backing-filename"):
              raise SystemExit("candidate has a backing file")
          data = (info.get("format-specific") or {}).get("data") or {}
          if data.get("compression-type") != "zstd":
              raise SystemExit("candidate does not use zstd cluster compression")
          PY
          digest=$(sha256sum "$asset" | awk '{print $1}')
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]

      - name: Bind structurally validated candidate digest
        run: |
          set -euo pipefail
          digest=$(sha256sum "$BUNDLE_DIR/$ASSET_NAME" | awk '{print $1}')
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          printf '%s\n' "$digest" > "$BUNDLE_DIR/internal-provenance/build-validated-digest"

      - name: Bind candidate metadata
        env:
          RUNNER_NAME_VALUE: ${{ runner.name }}
          RUN_ID_VALUE: ${{ github.run_id }}
          RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test -d "$WORK_DIR/provenance"
          cp -a "$WORK_DIR/provenance/." "$BUNDLE_DIR/internal-provenance/"
          validated=$(<"$BUNDLE_DIR/internal-provenance/build-validated-digest")
          python3 scripts/azurelinux4_release.py candidate \
            --key "$CANDIDATE_KEY" \
            --architecture "$ARCHITECTURE" \
            --flavor "$FLAVOR" \
            --asset "$BUNDLE_DIR/$ASSET_NAME" \
            --validated-sha256 "$validated" \
            --virtual-size "$VIRTUAL_SIZE" \
            --source-commit "$SOURCE_COMMIT" \
            --provenance-dir "$BUNDLE_DIR/internal-provenance" \
            --runner "$RUNNER_NAME_VALUE" \
            --run-id "$RUN_ID_VALUE" \
            --run-attempt "$RUN_ATTEMPT_VALUE" \
            --output "$BUNDLE_DIR/candidate.json"
          python3 scripts/azurelinux4_release.py verify-candidate \
            --manifest "$BUNDLE_DIR/candidate.json" \
            --asset "$BUNDLE_DIR/$ASSET_NAME" \
            --key "$CANDIDATE_KEY" \
            --source-commit "$SOURCE_COMMIT"

      - name: Upload exact validated candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: azurelinux4-candidate-${{ matrix.key }}-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: ${{ env.BUNDLE_DIR }}/
          if-no-files-found: error
          compression-level: 0
          retention-days: 2

      - name: Summarize hosted build validation
        env:
          RUNNER_NAME_VALUE: ${{ runner.name }}
        run: |
          set -euo pipefail
          digest=$(sha256sum "$BUNDLE_DIR/$ASSET_NAME" | awk '{print $1}')
          {
            echo "### Hosted candidate: $ASSET_NAME"
            echo
            echo "- Source: \`$SOURCE_COMMIT\`"
            echo "- SHA-256: \`$digest\`"
            echo "- Hosted runner: \`$RUNNER_NAME_VALUE\`"
            echo "- Native boot gate: protected Azure acceptance"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean privileged build state
        if: always()
        run: |
          sudo rm -rf -- "$WORK_DIR"
          rm -rf -- "$BUNDLE_DIR"
          rm -f -- "${UKI_SIGNING_CERTIFICATE:-}"

  azure_acceptance:
    name: Azure ${{ matrix.key }}
    needs: [prepare, build]
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        (
          needs.build.result == 'success' ||
          (
            needs.prepare.outputs.reuse_candidates == 'true' &&
            needs.build.result == 'skipped'
          )
        )
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    environment: azurelinux4-release
    permissions:
      actions: read
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: x86_64-full
            architecture: x86_64
            flavor: full
            asset_name: AzureLinux-4.0-x86_64.qcow2
            location_variable: AZURE_LOCATION_X64
            size_variable: AZURE_VM_SIZE_X64
          - key: aarch64-full
            architecture: aarch64
            flavor: full
            asset_name: AzureLinux-4.0-aarch64.qcow2
            location_variable: AZURE_LOCATION_ARM64
            size_variable: AZURE_VM_SIZE_ARM64
          - key: x86_64-core
            architecture: x86_64
            flavor: core
            asset_name: AzureLinux-4.0-x86_64.core.qcow2
            location_variable: AZURE_LOCATION_X64
            size_variable: AZURE_VM_SIZE_X64
          - key: aarch64-core
            architecture: aarch64
            flavor: core
            asset_name: AzureLinux-4.0-aarch64.core.qcow2
            location_variable: AZURE_LOCATION_ARM64
            size_variable: AZURE_VM_SIZE_ARM64
    env:
      CANDIDATE_KEY: ${{ matrix.key }}
      ARCHITECTURE: ${{ matrix.architecture }}
      FLAVOR: ${{ matrix.flavor }}
      ASSET_NAME: ${{ matrix.asset_name }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      CANDIDATE_DIR: .release/azure/${{ matrix.key }}/candidate
      RESULT_DIR: artifact-staging/azure-results/${{ matrix.key }}
      STATE_FILE: .release/azure/${{ matrix.key }}/resource-group
      AZURE_LOCATION: ${{ vars[matrix.location_variable] }}
      AZURE_VM_SIZE: ${{ vars[matrix.size_variable] }}
    steps:
      - name: Check out acceptance harness
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Check out accepted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: release-source
          ref: ${{ needs.prepare.outputs.source_commit }}
          persist-credentials: false

      - name: Download exact build-validated candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: azurelinux4-candidate-${{ matrix.key }}-${{ needs.prepare.outputs.source_commit }}-${{ needs.prepare.outputs.candidate_run_attempt }}
          path: ${{ env.CANDIDATE_DIR }}
          github-token: ${{ github.token }}
          run-id: ${{ needs.prepare.outputs.candidate_run_id }}

      - name: Fail closed on missing protected configuration
        env:
          AZURE_CLIENT_ID_VALUE: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID_VALUE: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID_VALUE: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          uuid='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
          [[ "$AZURE_CLIENT_ID_VALUE" =~ $uuid ]]
          [[ "$AZURE_TENANT_ID_VALUE" =~ $uuid ]]
          [[ "$AZURE_SUBSCRIPTION_ID_VALUE" =~ $uuid ]]
          [[ "$AZURE_LOCATION" =~ ^[a-z0-9-]+$ ]]
          [[ "$AZURE_VM_SIZE" =~ ^Standard_[A-Za-z0-9_]+$ ]]

      - name: Log in to Azure with protected-environment OIDC
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@7d8c3ef0886dd428a97727fce3b74909d6eace78 # v0.6.6
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          ghr-version: 0.6.6
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Require Azure acceptance tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openssh-client qemu-utils
          for tool in az azcopy qemu-img ssh ssh-keygen python3; do
            command -v "$tool" >/dev/null
          done
          az version --output json > /dev/null

      - name: Build accepted-source zvmi
        working-directory: release-source
        run: |
          set -euo pipefail
          unset ZIG_LOCAL_CACHE_DIR
          export ZIG_GLOBAL_CACHE_DIR=$PWD/.zig-global-cache
          zig build -Doptimize=ReleaseSafe
          test -x zig-out/bin/zvmi

      - name: Run exact-artifact Azure acceptance
        env:
          ZVMI: ${{ github.workspace }}/release-source/zig-out/bin/zvmi
          RUN_ID_VALUE: ${{ github.run_id }}
          RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        run: |
          export GITHUB_RUN_ID=$RUN_ID_VALUE
          export GITHUB_RUN_ATTEMPT=$RUN_ATTEMPT_VALUE
          scripts/azurelinux4_azure_acceptance.sh run

      - name: Refresh Azure OIDC credential for unconditional cleanup
        if: always()
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete only owned temporary Azure resources
        if: always()
        env:
          RUN_ID_VALUE: ${{ github.run_id }}
          RUN_ATTEMPT_VALUE: ${{ github.run_attempt }}
        run: |
          export GITHUB_RUN_ID=$RUN_ID_VALUE
          export GITHUB_RUN_ATTEMPT=$RUN_ATTEMPT_VALUE
          if [[ -x scripts/azurelinux4_azure_acceptance.sh ]]; then
            scripts/azurelinux4_azure_acceptance.sh cleanup
          elif [[ -s "$STATE_FILE" ]]; then
            echo "::error::Cleanup script is absent while Azure state exists"
            exit 1
          fi

      - name: Upload failed Azure acceptance diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: azurelinux4-azure-failure-${{ matrix.key }}-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: |
            ${{ env.RESULT_DIR }}/*.json
            ${{ env.RESULT_DIR }}/boot.log
            ${{ env.RESULT_DIR }}/uefi-db.bin
          if-no-files-found: warn
          retention-days: 2

      - name: Upload exact Azure acceptance result
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: azurelinux4-azure-${{ matrix.key }}-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: ${{ env.RESULT_DIR }}/azure-result.json
          if-no-files-found: error
          retention-days: 2

      - name: Remove derived VHD and local credentials
        if: always()
        run: rm -rf -- ".release/azure/$CANDIDATE_KEY" "$RESULT_DIR"

  publish:
    name: verify four-by-four gate and publish
    needs: [prepare, build, azure_acceptance]
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        (
          needs.build.result == 'success' ||
          (
            needs.prepare.outputs.reuse_candidates == 'true' &&
            needs.build.result == 'skipped'
          )
        ) &&
        needs.azure_acceptance.result == 'success'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: azurelinux4-release
    permissions:
      actions: read
      contents: write
    env:
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      CANDIDATES_DIR: .release/publication/candidates
      AZURE_RESULTS_DIR: .release/publication/azure
      STAGING_ROOT: .release/publication/staging
      REPOSITORY: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      PREPARE_RESULT: ${{ needs.prepare.result }}
      BUILD_RESULT: ${{ needs.prepare.outputs.reuse_candidates == 'true' && 'success' || needs.build.result }}
      AZURE_RESULT: ${{ needs.azure_acceptance.result }}
    steps:
      - name: Check out accepted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_commit }}
          persist-credentials: false

      - name: Download all build-validated candidates
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: azurelinux4-candidate-*-${{ needs.prepare.outputs.source_commit }}-${{ needs.prepare.outputs.candidate_run_attempt }}
          path: ${{ env.CANDIDATES_DIR }}
          merge-multiple: false
          github-token: ${{ github.token }}
          run-id: ${{ needs.prepare.outputs.candidate_run_id }}

      - name: Download all Azure acceptance results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: azurelinux4-azure-*-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: ${{ env.AZURE_RESULTS_DIR }}
          merge-multiple: false

      - name: Publish only after explicit complete matrix validation
        run: |
          set -euo pipefail
          test "$PREPARE_RESULT" = success
          test "$BUILD_RESULT" = success
          test "$AZURE_RESULT" = success
          scripts/azurelinux4_publish.sh
