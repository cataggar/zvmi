name: Build, validate, and publish FreeBSD 15.1 images

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: freebsd15-release-20260724
  cancel-in-progress: false

env:
  RELEASE_TAG: FreeBSD-15.1-20260724
  RELEASE_TITLE: FreeBSD 15.1 - 20260724

jobs:
  prepare:
    name: resolve immutable main source
    if: github.repository == 'cataggar/zvmi' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      source_commit: ${{ steps.source.outputs.commit }}
    steps:
      - name: Check out merged main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Bind release to source commit
        id: source
        run: |
          set -euo pipefail
          commit=$(git rev-parse HEAD)
          [[ "$commit" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse origin/main)" = "$commit"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "Accepted source commit: \`$commit\`" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build and validate ${{ matrix.architecture }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 150
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - architecture: aarch64
            runner: ubuntu-24.04-arm
            asset_name: FreeBSD-15.1-aarch64.qcow2
            source_name: FreeBSD-15.1-RELEASE-arm64-aarch64-BASIC-CLOUDINIT-ufs.qcow2.xz
            source_url: https://download.freebsd.org/releases/VM-IMAGES/15.1-RELEASE/aarch64/Latest/FreeBSD-15.1-RELEASE-arm64-aarch64-BASIC-CLOUDINIT-ufs.qcow2.xz
            source_sha256: 9722aea499610802de9a14bb645707fc4f6df49ff765cd9ce372b783c4693963
            virtual_size: 6477643776
            qemu: /usr/bin/qemu-system-aarch64
          - architecture: x86_64
            runner: ubuntu-24.04
            asset_name: FreeBSD-15.1-x86_64.qcow2
            source_name: FreeBSD-15.1-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz
            source_url: https://download.freebsd.org/releases/VM-IMAGES/15.1-RELEASE/amd64/Latest/FreeBSD-15.1-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz
            source_sha256: e4ca4db889f8559c9b9dfcacc70405c038476f4b6d41649b152d3809a2ed9e1f
            virtual_size: 6477709312
            qemu: /usr/bin/qemu-system-x86_64
    env:
      ARCHITECTURE: ${{ matrix.architecture }}
      ASSET_NAME: ${{ matrix.asset_name }}
      SOURCE_NAME: ${{ matrix.source_name }}
      SOURCE_URL: ${{ matrix.source_url }}
      SOURCE_SHA256: ${{ matrix.source_sha256 }}
      VIRTUAL_SIZE: ${{ matrix.virtual_size }}
      QEMU: ${{ matrix.qemu }}
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      WORK_DIR: .scratch/generalized-freebsd15-${{ matrix.architecture }}
      CANDIDATE_DIR: candidate
    steps:
      - name: Check out accepted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_commit }}
          persist-credentials: false

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@7d8c3ef0886dd428a97727fce3b74909d6eace78 # v0.6.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          ghr-version: 0.6.6
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Install image build dependencies
        run: |
          set -euo pipefail
          case "$ARCHITECTURE" in
            aarch64)
              platform_packages=(qemu-efi-aarch64 qemu-system-arm)
              expected_uname=aarch64
              ;;
            x86_64)
              platform_packages=(ovmf qemu-system-x86)
              expected_uname=x86_64
              ;;
            *)
              exit 1
              ;;
          esac
          test "$(uname -m)" = "$expected_uname"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl jq openssh-client qemu-utils xorriso xz-utils \
            "${platform_packages[@]}"
          test -x "$QEMU"

      - name: Cache verified FreeBSD source
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.WORK_DIR }}/${{ env.SOURCE_NAME }}
          key: freebsd-15.1-${{ matrix.architecture }}-basic-cloudinit-ufs-${{ env.SOURCE_SHA256 }}

      - name: Build generalized QCOW2
        run: |
          set -euo pipefail
          mkdir -p "$CANDIDATE_DIR"
          zig build generalized-freebsd15 -- \
            --architecture "$ARCHITECTURE" \
            --work-dir "$GITHUB_WORKSPACE/$WORK_DIR" \
            --output "$GITHUB_WORKSPACE/$CANDIDATE_DIR/$ASSET_NAME" \
            --qemu "$QEMU" \
            --xorriso /usr/bin/xorriso \
            --timeout 3600 2>&1 |
            tee "$RUNNER_TEMP/freebsd15-$ARCHITECTURE-build.log"

      - name: Validate release image
        run: |
          set -euo pipefail
          asset="$CANDIDATE_DIR/$ASSET_NAME"
          qemu-img check "$asset"
          image_info=$(qemu-img info --output=json "$asset")
          test "$(jq -r '.format' <<<"$image_info")" = qcow2
          test "$(jq -r '."virtual-size"' <<<"$image_info")" = "$VIRTUAL_SIZE"
          test "$(jq -r '."backing-filename" // ""' <<<"$image_info")" = ""
          test "$(jq -r '."format-specific".data."compression-type"' <<<"$image_info")" = zstd
          zig build run -- check "$asset"

      - name: Run dual-instance QEMU acceptance
        env:
          ZVMI_FREEBSD15_ARCHITECTURE: ${{ matrix.architecture }}
          ZVMI_FREEBSD15_IMAGE: ${{ github.workspace }}/${{ env.CANDIDATE_DIR }}/${{ env.ASSET_NAME }}
          ZVMI_FREEBSD15_QEMU: ${{ matrix.qemu }}
        run: zig build test-freebsd15-boot

      - name: Record validated candidate
        run: |
          set -euo pipefail
          asset="$CANDIDATE_DIR/$ASSET_NAME"
          source="$WORK_DIR/$SOURCE_NAME"
          asset_sha256=$(sha256sum "$asset" | awk '{print $1}')
          source_sha256=$(sha256sum "$source" | awk '{print $1}')
          test "$source_sha256" = "$SOURCE_SHA256"
          qemu_version=$("$QEMU" --version | head -n 1)
          python3 scripts/freebsd15_release.py candidate \
            --architecture "$ARCHITECTURE" \
            --asset "$asset" \
            --validated-sha256 "$asset_sha256" \
            --virtual-size "$VIRTUAL_SIZE" \
            --source-name "$SOURCE_NAME" \
            --source-url "$SOURCE_URL" \
            --source-sha256 "$source_sha256" \
            --source-bytes "$(stat --format='%s' "$source")" \
            --source-commit "$SOURCE_COMMIT" \
            --qemu-version "$qemu_version" \
            --runner "${{ matrix.runner }}" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --output "$CANDIDATE_DIR/candidate.json"

      - name: Upload exact validated candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: freebsd15-candidate-${{ matrix.architecture }}-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: ${{ env.CANDIDATE_DIR }}/
          if-no-files-found: error
          compression-level: 0
          retention-days: 2

  publish:
    name: verify two-asset gate and publish
    needs: [prepare, build]
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        needs.build.result == 'success'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      SOURCE_COMMIT: ${{ needs.prepare.outputs.source_commit }}
      CANDIDATES_DIR: .release/freebsd15/candidates
      STAGING_ROOT: .release/freebsd15/staging
      REPOSITORY: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out accepted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.source_commit }}
          persist-credentials: false

      - name: Download both build-validated candidates
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: freebsd15-candidate-*-${{ needs.prepare.outputs.source_commit }}-${{ github.run_attempt }}
          path: ${{ env.CANDIDATES_DIR }}
          merge-multiple: false

      - name: Publish only the exact two-asset release
        run: scripts/freebsd15_publish.sh
