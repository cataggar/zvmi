name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: zig fmt --check
        run: zig fmt --check .

      - name: Azure Linux release workflow unit tests
        run: python3 -m unittest discover -s tests -p azurelinux4_release_test.py

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test --summary all

      - name: privileged unsafe-chroot integration
        env:
          ZVMI_RUN_PRIVILEGED_TEST: "1"
        run: zig build test-unsafe-chroot-integration --summary all
