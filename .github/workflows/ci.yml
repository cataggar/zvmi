name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: zig fmt --check
        run: zig fmt --check .

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test --summary all

  boot-smoke:
    name: real QEMU boot smoke test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig via ghr
        uses: cataggar/ghr/actions/install@v0.6.6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tools: |
            cataggar/zig@v0.16.0 RWSGOq2NVecA2UPNdBUZykf1CCb147pkmdtYxgb3Ti+JO/wCYvhbAb/U

      - name: Install QEMU + OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf

      - name: Cache Azure Linux ISO fixture
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: fixtures/azurelinux-4.0-x86_64.iso
          key: azurelinux-4.0-x86_64-iso-v1

      - name: Download Azure Linux ISO fixture
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          mkdir -p fixtures
          curl -fL --retry 3 -o fixtures/azurelinux-4.0-x86_64.iso https://aka.ms/azurelinux-4.0-x86_64.iso

      - name: Build minimal OCI fixture
        run: python3 scripts/ci/make-minimal-oci-fixture.py fixtures/oci-minimal

      - name: Install systemd-boot-efi (UKI stub source)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends systemd-boot-efi

      - name: Build UKI-stub OCI fixture
        continue-on-error: true
        run: |
          stub=/usr/lib/systemd/boot/efi/linuxx64.efi.stub
          if [ -f "$stub" ]; then
            python3 scripts/ci/make-uki-stub-oci-fixture.py fixtures/oci-uki-stub "$stub"
            echo "ZVMI_BOOT_TEST_UKI_OCI=${GITHUB_WORKSPACE}/fixtures/oci-uki-stub" >> "$GITHUB_ENV"
          else
            echo "::warning::$stub not found (systemd-boot-efi install failed?); ZVMI_BOOT_TEST_UKI_OCI won't be set, so the UKI boot-smoke test will skip"
          fi

      - name: zig build test-boot-smoke
        env:
          ZVMI_BOOT_TEST_ISO: ${{ github.workspace }}/fixtures/azurelinux-4.0-x86_64.iso
          ZVMI_BOOT_TEST_OCI: ${{ github.workspace }}/fixtures/oci-minimal
        run: zig build test-boot-smoke --summary all
